name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3"|g' \
            -e 's|path = "\.\./zensim/zensim"|git = "https://github.com/imazen/zensim"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Test
        run: cargo test --lib

  i686:
    name: Test (i686)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3"|g' \
            -e 's|path = "\.\./zensim/zensim"|git = "https://github.com/imazen/zensim"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Test (i686, no SIMD)
        run: cross test --target i686-unknown-linux-gnu --lib --no-default-features --features std

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3"|g' \
            -e 's|path = "\.\./zensim/zensim"|git = "https://github.com/imazen/zensim"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Clippy
        run: cargo clippy --lib -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3"|g' \
            -e 's|path = "\.\./zensim/zensim"|git = "https://github.com/imazen/zensim"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Check MSRV
        run: cargo hack check --rust-version

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3"|g' \
            -e 's|path = "\.\./zensim/zensim"|git = "https://github.com/imazen/zensim"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Generate coverage
        run: cargo llvm-cov --lib --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
