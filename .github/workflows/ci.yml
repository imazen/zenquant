name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CI: true
  # Public-API snapshot regen (tests/public_api_doc.rs) needs nightly
  # rustdoc + cargo-public-api; only the clippy job carries them and runs
  # the =check gate. Everywhere else the test skips.
  ZEN_API_DOC: off

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-latest
          - macos-26-intel
          - windows-latest
          - windows-11-arm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6.0"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3.2"|g' \
            -e 's|path = "\.\./zensim/zensim"|version = "0.2.0"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Test
        run: cargo test --lib

      - name: Test (joint feature)
        run: cargo test --lib --features joint

  i686:
    name: Test (i686)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - uses: Swatinem/rust-cache@v2
        with:
          key: cross-i686

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6.0"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3.2"|g' \
            -e 's|path = "\.\./zensim/zensim"|version = "0.2.0"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Test (i686)
        run: cross test --target i686-unknown-linux-gnu --lib

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6.0"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3.2"|g' \
            -e 's|path = "\.\./zensim/zensim"|version = "0.2.0"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Clippy
        run: cargo clippy --lib -- -D warnings

      - name: Clippy (joint feature)
        run: cargo clippy --lib --features joint -- -D warnings

      - uses: dtolnay/rust-toolchain@nightly # rustdoc JSON for cargo-public-api
      - uses: dtolnay/rust-toolchain@stable # restore stable as default
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-public-api
      - name: Public-API snapshot is current
        run: cargo test --test public_api_doc
        env:
          ZEN_API_DOC: check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-hack
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6.0"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3.2"|g' \
            -e 's|path = "\.\./zensim/zensim"|version = "0.2.0"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Check MSRV
        run: cargo hack check --rust-version

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2

      - name: Patch path deps for CI
        shell: bash
        run: |
          sed \
            -e 's|path = "\.\./zengif"|version = "0.6.0"|g' \
            -e 's|path = "\.\./zenwebp"|version = "0.3.2"|g' \
            -e 's|path = "\.\./zensim/zensim"|version = "0.2.0"|g' \
            -e '/^zenpng/d' \
            Cargo.toml > Cargo.toml.ci && mv Cargo.toml.ci Cargo.toml

      - name: Generate coverage
        run: cargo llvm-cov --lib --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        continue-on-error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
